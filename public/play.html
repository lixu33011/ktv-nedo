<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { background: #111; color: #fff; padding: 20px; }
        .song-item { padding: 12px; background: #222; margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between; }
        button { padding: 6px 10px; background: #ff3c3c; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <h2>我的歌单</h2>
    <div id="songList"></div>

    <script type="module">
        import { SpectrumBarBg } from './bg1.js';
        const audio = new Audio();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        SpectrumBarBg.init(document.getElementById('bg'), analyser);

        const uid = new URLSearchParams(location.search).get('uid');
        loadList();

        // 加载歌单（已改接口）
        async function loadList() {
            const res = await fetch('/api/my_list?uid=' + uid);
            const data = await res.json();
            const html = data.data.map(item => `
                <div class="song-item">
                    <div>${item.song_name} - ${item.artist}</div>
                    <div>
                        <button onclick="del(${item.id})">删除</button>
                    </div>
                </div>
            `).join('');
            songList.innerHTML = html;
        }

        // 删除歌曲（已改接口）
        async function del(id) {
            await fetch('/api/del_song?id=' + id);
            loadList();
        }
    </script>
</body>
</html>
