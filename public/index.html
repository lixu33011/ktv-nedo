<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTV点歌系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #111; color: #fff; padding: 20px; }
        .box { max-width: 400px; margin: 50px auto; padding: 30px; background: #222; border-radius: 12px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: none; border-radius: 6px; color: #fff; font-size: 16px; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #ff3c3c; border: none; border-radius: 6px; color: #fff; font-size: 16px; cursor: pointer; }
        .tip { margin-top: 15px; text-align: center; cursor: pointer; color: #aaa; }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h2>用户登录</h2>
        <input id="loginUser" placeholder="用户名">
        <input id="loginPwd" type="password" placeholder="密码">
        <button onclick="login()">登录</button>
        <div class="tip" onclick="showReg()">没有账号？去注册</div>
    </div>

    <div class="box" id="regBox" style="display: none;">
        <h2>用户注册</h2>
        <input id="regUser" placeholder="用户名">
        <input id="regPwd" type="password" placeholder="密码">
        <button onclick="reg()">注册</button>
        <div class="tip" onclick="showLogin()">已有账号？去登录</div>
    </div>

    <script>
        let uid = null;
        function showReg() { loginBox.style.display = 'none'; regBox.style.display = 'block'; }
        function showLogin() { regBox.style.display = 'none'; loginBox.style.display = 'block'; }

        // 登录（已改接口）
        async function login() {
            const user = loginUser.value.trim();
            const pwd = loginPwd.value.trim();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pwd })
            });
            const data = await res.json();
            if (data.code === 0) {
                uid = data.uid;
                alert('登录成功');
                location.href = 'play.html?uid=' + uid;
            } else {
                alert('账号或密码错误');
            }
        }

        // 注册（已改接口）
        async function reg() {
            const user = regUser.value.trim();
            const pwd = regPwd.value.trim();
            const res = await fetch('/api/reg', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pwd })
            });
            const data = await res.json();
            alert(data.msg);
            if (data.code === 0) showLogin();
        }
    </script>
</body>
</html>
