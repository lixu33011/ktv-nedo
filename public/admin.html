<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { background: #111; color: #fff; padding: 20px; }
        .admin-box { max-width: 400px; margin: 50px auto; padding: 30px; background: #222; border-radius: 12px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: none; border-radius: 6px; color: #fff; }
        button { width: 100%; padding: 12px; background: #ff3c3c; border: none; border-radius: 6px; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>管理员登录</h2>
        <input id="adminUser" placeholder="账号">
        <input id="adminPwd" type="password" placeholder="密码">
        <button onclick="adminLogin()">登录</button>
    </div>

    <script>
        // 管理员登录（已改接口）
        async function adminLogin() {
            const user = adminUser.value.trim();
            const pwd = adminPwd.value.trim();
            const res = await fetch('/api/admin_login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pwd })
            });
            const data = await res.json();
            if (data.code === 0) {
                alert('登录成功');
                location.href = 'admin_home.html';
            } else {
                alert('账号密码错误');
            }
        }
    </script>
</body>
</html>
